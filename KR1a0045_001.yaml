body:
  text: 易禪傳宋林至撰法象第一太極者萬化之本也陰陽動靜之理雖具於其中而其肇未形焉故曰易有太極太極動而生陽靜而生陰分陰分陽兩儀立焉則竒耦之畫所自形也故曰太極生兩儀此太極一變而得之者也陽分而為陰陽曰陽中之陽陽中之陰陰分而為陰陽曰陰中之陰陰中之陽陽中之陽陰中之陰是為老陽老隂陽中之陰陰中之陽是為少陽少陰此四象之畫所自成也故曰兩儀生四象此太極再變而得之者也四象之陰陽復分而八卦成列則三才之畫具矣乾與坤對離與坎對兑與艮對震與巽對故曰四象生八卦此太極三變而得之者也大傳曰八卦成列象在其中矣因而重之爻在其中矣説卦曰分隂分陽迭用柔剛故易六位而成章此八卦重而為六十四卦太極六變而得之者也易者陰陽動靜之總名也體用一原顯微無間以其渾然全體肇朕未形則曰太極次第相生自本而末則有兩儀四象八卦之分極而六十四卦三百八十四爻其實皆一易也方其為太極也卦畫之理未嘗不具及其為卦畫也太極之體無乎不在初非二物也大傳曰易有太極是生兩儀兩儀生四象四象生八卦已得乾一兑二離三震四巽五坎六艮七坤八此八卦之小成也又曰因而重之爻在其中矣此八卦之生六十四卦也太極六變而得之者也六畫既具則八八還相重復本卦為內重卦為外亦不外乎乾一兑二離三震四巽五坎六艮七坤八之序也邵康節曰太極既分兩儀立矣陽上交於陰陰下交於陽而四象生矣陽交於陰陰交於陽而生天之四象剛交於柔柔交於剛而生地之四象八卦相錯而萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈小愈細則愈繁故自太極之一變則始於一陰一陽之相交再變則二陰二陽三變則四陰四陽四變則八隂八陽五變則十六陰十六陽六變則三十二陰三十二陽而六十四卦備矣此大傳所謂分陰分陽迭用柔剛故易六位而成章者也儒者論易人奮其私智往往巧為推排而聖人畫易之本原益昧而不明觀此圖之統體則可以見自然之序非私智之所能及也康節曰易有三百八十四爻真天文也又曰圖雖無文吾終日言而未嘗離乎是天地萬物之理盡在其中矣大傳曰天地定位山澤通氣雷風相薄水火不相射此包犧氏先天八卦也帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮此文王後天八封也是以康節曰天地定位一節明伏犧八卦也起震終艮一節明文王八卦也八卦相錯明交錯而成六十四卦也以造化之序論之先天所以立體也後天所以致用也先天乾坤定上下之位而天尊地卑之體立矣坎離居左右之門而日生乎東月生乎西之象著矣震巽對峙而雷始於東北風起於西南矣兑艮角立西北多山東南多水之所鍾矣後天震居東方萬物出生之地巽居東南萬物潔齊之地坤西南萬物致養之地兑正西物之所説乾西北陰陽之相薄坎正北物之所歸艮東北所以成終成始者也以陰陽之體論之巽離兑本陽體也而陰來交之震坎艮本陰體也而陽來交之伏犧之卦得陽多者屬乎陽得陰多者屬乎陰後天之卦得一陰者為三女得一陽者為三男先天之位三女附乎乾三男附乎坤陰附陽陽附陰也後天之位三男附乎乾三女附乎坤者陰附陰陽附陽也康節曰至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位兑震為偶應地之方王者之法其盡於是矣極數第二天一地二天三地四天五地六天七地八天九地十大傳曰天一地二天三地四天五地六天七地八天九地十此天地五十有五之數也自有天地此數已具曰天數五者五竒數也地數五者五偶數也曰天數二十有五總五竒數言之也地數三十總五偶數言之也凡天地之數五十有五者合竒偶之數而言之也夫子於繫辭言數者三曰天地之數五十有五曰天一終於地十曰參天兩地而已雖曰河出圖洛出書初未嘗曰某為圖某為書也至劉牧出鈎隱圖始以四十五為河圖而五十五為洛書且以為出於希夷之所傳授始有戴九履一左三右七二四為肩六八為足縱橫十五總四十有五之説前此未之見也孔頴達曰龜負洛書先無此事見之緯候之書牧不信聖人之言而主於緯候之説何耶大抵聖人闡易有象則有數有數則有變象則太極生兩儀四象八卦者也數則五十有五竒偶之生成者也變則揲蓍倚數生爻者也要不出於三者而已如牧之為圖巧則巧矣於易何取焉且其數曰縱橫十五而已所以成卦生卦無聞焉不知何與於易哉然則所謂五十有五之為易者可得間歟曰自五以下為五行生數自五以上為五行成數故十五者小衍也五十有五者大衍也且以小衍論之九六者易之真數也今五生數是也天一天三天五參天也總而為九地二地四兩地也總而為六參天雨地而九六之數立矣至於七之與八又自小衍之五裂而言之也以大衍論之天地之數五十有五而大衍之數五十者自五以下五其本體也一四五也三二亦五也自五以上六一五也七二五也八三五也九四五也十五五也天五無往而不在此大衍之用所以止於五十也以參伍其變錯綜其數論之太極者三五之中也老陽九老陰六十五也少陰八少陽七十五也此小衍之五也至於五十有五錯之則竒偶之數各立以成體綜之則竒偶之數相合以致用是故通其變則因七九八六之變而隂陽剛柔之文成極其數則因五十有五之數而天地萬物生成之理不越乎是矣以至乾坤二篇之䇿雖因生蓍設卦而得之而亦不出乎九六之積也緯候之家不過借河圖洛書之説以神其事至牧反覆言之而世之論易者多宗其説易之本原愈以不明本朝惟歐陽公以圖書為怪妄之甚為説以黜之然一人之言不能勝久習之溺也特學易者不深察之耳今所謂極數者本之天地五十有五之數而黜圖書之妄雖得罪於君子不辭也觀變第三大傳曰大衍之數五十其用四十有九其一不用者一在四十九數之中其太極之全體乎分而為二以象兩者分置於左右手以象兩儀也挂一以象三者以右手一蓍挂於左手之小指間以象三才也揲之以四象四時者左右手之策各四四數之以象四時也歸竒於扐以象閏者九四數之餘皆竒也扐於中食指之間以象閏也其法先以左手之䇿四四數之其竒數扐於食指間是為一扐復以右手之策四四數之竒數扐於中指間是為再扐凡一挂再揲再扐是為一變五嵗再閏故再扐而後挂者再扐之後而復挂一其揲扐如前以求第二變其第三變亦然凡三變而成一爻十有八變而成一卦第一揲皆自下數之下之一即挂一也三一一二二一一三一為五者三四四一為九者一右第一揲通挂扐之數得五餘四十四䇿乾兑離震之象得九餘四十䇿坤巽坎艮之象第二揲第三揲同二一一一二一為四者二四三一三四一為八者二右第二揲通挂扐之數若四十四䇿得四則餘四十乾兑之象得八餘三十六離震之象若四十䇿得四餘三十六坎巽之象得八餘三十二坤艮之象右第三揲通挂扐之數若四十䇿而得四則餘三十六以四數之凡九是為老陽乾之象得八則餘三十二以四數之凡八是為老陰兑之象若三十六䇿而得四則餘三十二以四數之凡八是為少陰若初四十四則離之象初四十則巽之象得八則餘二十八以四數之凡七是為少陽若初四十四則震之象若初四十則坎之象若三十二而得四則二十八以四數之凡七亦為少陽艮之象得八則餘二十四以四數之凡六亦為老陰坤之象凡卦一爻三變實具四體自策言之三揲始成一爻自變言之三揲已具一象大衍論曰易始於三微而生一象四象成而後八卦章三變皆剛太陽之象三變皆柔太陰之象一剛二柔少陽象也一柔二剛少陰象也第一揲第二揲第三揲第一揲第二揲第三揲右左挂右左挂右左挂右左挂右左挂右左挂三一一二一一一二一三一一一二一二一一二一一二一一一二一一二一二二一二一一一二一二二一一二一二一一二一一二一一一二一一二一一三一二一一一二一一三一一二一二一一二一一二一一一二一一二一右三變之餘通挂扐之數凡十三則過揲之䇿餘三十六以四數之得九九老陽也其畫重凡三變所得雖或不同而為老陽者十有二四四一四三一四三一四四一三四一三四一四三一三四一三四一四三一右三變之餘通挂扐之數凡二十有五則過揲之䇿餘二十四以四數之則六六老陰也其畫交凡三變所得雖或不同而為老陰者有四一三一二一一四三一一三一二一一三四一一二一四三一一二一三四一四三一二一一四三一一二一三四一二一一三四一一二一二二一二一一四三一二二一二一一二四一一二一四三一一二一三四一四三一二一一四三一一二一三四一二一一三四一一二一一三一二一一四三一一三一二一一三四一一二一三四一一二一四三一三四一二一一三四一一二一四三一二一一四三一一二一四四一二一一二一一四四一一二一一二一二一一一二一一二一二一一右三變之餘通挂扐之數凡十七則過揲之䇿餘三十二以四數之則八八少陰也其畫耦凡三變所得雖或不同而為少陰者二十有八三一一四三一四三一三一一四三一三四一三四一三四一三四一四三一二二一四三一四三一二二一四三一三四一三四一三四一三四一四三一一三一四三一四三一一三一四三一三四一三四一三四一三四一四三一四四一一二一四三一四四一一二一三四一二一一四三一二一一三四一四三一二一一四三一一二一三四一二一一三四一一二一右三變之餘通挂扐之數凡二十一則過揲之䇿餘二十八以四數之則七七少陽也其畫竒凡三變所得雖或不同而為少陽者有二十大傳曰四營而成易所謂四營者謂分二挂一揲四歸竒也近世儒者不得夫再扐而後挂之義始有第一變挂而二三不挂者不知大傳之所謂竒者四數之餘凡不及乎四者皆竒也或數止於四者其四亦竒也康節曰竒數四有一有二有三有四扐者以所得左手之竒數扐於中指間也再扐者右手之竒數復扐於左之食指也此第一變也二三復自挂一而始焉觀董生所陳畢中和一行九六誠可見矣苟如議者謂二三變不挂殊失再挂之義所謂四營者亦止於三營而已今三變皆挂凡六十四變為老陽者十二為老陰者四為少陽者二十為少陰者二十八老則陽多而陰少少則陽少而陰多然而陰陽之變各三十二此其適平也若二三變不挂則一揲為五者三為九者一二三揲為四者三為八者一故五四常多而九八常少六十四變而為老陽者至二十七為老陰者一為少陰者二十七為少陽者九於陰陽多寡既已乖戾而老陰止於二則揲蓍生爻之際動皆老陽所謂老陰者絶無而僅有也然而三揲皆挂而四象之數亦終於不齊者何也大衍論曰蓍數之變九六各一乾坤之象也七八各三六子之象也嘗試以六十四變論之六十四而八分之老陽得八老陰得八乾坤之象也震坎艮三少陽巽離兑三少陰也故少陽三其八得二十四少陰亦三其八得二十四此體數也用數則不能無損益於其間邵康節曰陰陽半而形質具焉陰陽偏而情性分焉體數則陰陽各半用數則陰侵陽陽侵陰陽之侵陰陽之陽也陰之侵陽亦其用事之陰則陰之陽也是故少則陽少而陰多者少陽少陰均二十四而少陽之四益於少陰則少陽二十而少隂二十八也老則陽進而陰退老陰之四歸於老陽則老陽十二而老陰四也易之義在於揲蓍此其大旨也若夫十有八變而爻有變動則隨其所得而考焉凡一爻變如畢萬筮仕於晉遇屯之比初九變也蔡墨曰乾之同人九二變也晉侯使卜偃筮秦師遇大有之睽九三變也陳敬仲遇觀之否六四變也陽虎遇泰之需六五變也晉獻公筮嫁伯姬遇歸妹之睽上六變也先言變爻次合內外一體言之二爻變三爻變如晉公子重耳筮得貞屯悔豫皆八也蓋初四五三爻變也二四六三爻不變者皆少陰也以本卦為貞之卦為悔合二變卦繇辭而言之亦論變爻也畢中和云貞屯悔豫變與定均也四爻變五爻變如穆薑往東宫遇艮之八曰是謂艮之隨注謂雜用連山歸藏非也蓋艮五爻皆變獨二少陰不變蓋以不變爻占也畢中和九六議惟二不動斯謂八也今變者五而定者一宜從少占又董因迎晉公得泰之八曰是謂天地配亨韋昭與貞屯悔豫同非也九六議謂六五一爻不變帝乙歸妹是也六爻變蔡墨曰乾之坤曰見羣龍無首吉全體不變如秦伯伐晉卜徒父筮之其卦遇蠱蠱之貞風也其悔山也此以內外卦為貞悔也凡一卦變六十三卦以上下體論之上體不變者七卦下體不變者七卦全體變者一卦餘四十八卦各爻既變則體亦不同也以爻觀之一爻與五爻變者各六卦二爻與四爻變者各十五卦三爻變者二十卦不變與盡變者各一卦凡六十四卦變而為四千九十六卦此亦太極十二變而得之者也又以六十四自相乘而得之者也焦延夀之易林其得易之卦變者乎易神傳
