body:
  text: 易禆傳易類提要臣等謹案易禆傳二卷宋林至撰至字徳久松江人書録解題作檇李人未詳孰是淳熙中登進士第官至秘書省正字朱子集中有答林徳久書即其人也是書宋史藝文志作一卷文獻通考於二卷之外又有外篇一卷此本為元至正間陳泰所刻總為二卷葢泰所併也凡三篇一曰法象一曰極數一曰觀變自序稱法象本之太極極數本之天地數觀變本之卦揲十有八變皆據易大傳之文凡論太極者惑于四象之説而失卦畫之本論天地之數者惑于圖書之文而失參兩之宗論揲蓍者惑于掛扐之間而失陰陽之變各釐而正之其外篇則論反對相生世應互體納甲變爻動爻卦氣八事自序稱謂其非易之道則不可謂易盡在于是則非今觀其書雖未免有主持稍過之處而所論多中説易之弊其謂易道變化不窮得其一端皆足以為説尤至論也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易禆傳序易之為道生生而不窮其著之卦變皆本於氣數之自然非私智之能及也昔河南夫子為易傳一書使學者因辭以逹義象數之説夫子雖未嘗言亦曰得其義則象數在其中矣今世之言易者往往喜談象數或出已智或摭先儒之説牽合傅㑹似若可聴者然其巧愈甚其失彌逺不知易之謂象數者初不若是其紛紛也至不佞竊有意於此輒本之易大傳為禆傳三篇曰法象曰極數曰觀變法象則本之太極極數則本之天地之數觀變則本之蓍之十有八變是三者大傳之中嘗言之矣惟其論太極者惑於四象之説而失卦畫之本論天地之數者惑於圖書之文而失參兩之宗論揲蓍者惑於挂扐之間而失陰陽之變今各釐而正之使不失其條理則知象數皆自然而然果非私智之能及也至於數變之説曰反對曰相生曰世應曰互體曰納甲曰變爻曰勤爻曰對氣謂非易之道則不可謂易盡在於是則非也要之易道變通不窮得其一端皆足以為説以其大傳未嘗有言故亦總其大略以為外篇或曰子之於易皆本之大傳是也而諸儒之説皆略之毋乃自為是不韙也葢易雖寓之象數孰知論象數者至大傳而無餘矣凡大傳之所不言亦何敢言哉故寧得是不韙而不辭也谷水林至序
