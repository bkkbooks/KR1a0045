body:
  text: 易裨傳外篇宋林至撰李氏變卦反對圖乾坤二卦為易之門萬物之祖圖第一舊本曰功成無為圖乾老陽坤老陰乾坤相索三變六卦不反對圖第二坤體而乾來交頤小過坎乾體而坤來交大過中孚離乾卦一陰下生反對變六卦圖第三姤同人履夬有大畜小坤卦一陽下生反對變六卦圖第四復師謙剝比豫乾卦下生二陰各六變反對變十二卦圖第五遁訟無妄壯大需畜大睽兑革人家巽鼎坤卦下生二陽各六變反對變十二卦圖第六臨明夷升觀晉萃蹇艮蒙解震屯乾卦下生三陰各三變反對變十二卦圖第七否恆豐泰咸旅歸妹節既濟漸渙濟未坤卦下生三陽各六變反對變十二卦圖第八泰損賁否益嗑噬蠱井既濟隨困濟未李挺之變卦反對圖八篇六十四卦相生圖一篇漢上朱氏以為康節之子伯溫傳之於河陽陳四丈陳傳之於挺之長楊郭氏序李氏象學先天卦變曰陳圖南以授穆伯長伯長以授李挺之挺之以授邵堯夫陳安民安民以授兼山卦變一義橫渠伊川罕言而兼山獨得之康節本為先天易學而觀物外篇亦曰體者八變用者六變是以八卦之象不易者四反易者二以六變而成八也不易者四謂乾坤坎離也變易者二謂震艮巽兑也重卦之後不易者八反覆者二十八不易者乾坤坎離頥小過中孚大過也變易者二十八餘五十六卦也以三十六變而成六十四也又曰乾坤之位可易也坎離名可易而位不可易也震巽位可易而名不可易也兑與艮名位皆可易也離肖乾坎肖坤中孚肖乾頤肖離小過肖坤大過肖坎是以乾坤坎離中孚頤大小過皆不可易也又曰卦之反對皆六陽六陰也在易則六陽六陰者十有二對也去四正則八陽四陰八陰四陽者各六對也十陽二陰十陰二陽者各三對也此以三陰三陽為主而變也六陰六陽十二對者否變泰咸恆豐旅漸歸妹渙節既濟未濟六對四正初經則乾坤坎離重卦則頤中孚大過小過八陽四陰八陰四陽各六對者遁變大壯需訟無妄大畜睽家人兑革六對臨變觀明夷晉升萃蹇解艮震蒙屯六對十陽二陰十陰二陽各二對姤變夬同人大有履小畜三對復變剝師比謙三卦凡五十六也而此有三十對者否泰司啓閉之節既濟未濟當四隅之位所以重用一卦乾坤本也坎離用也乾坤坎離上篇之用也咸兑艮也恆震巽也兑艮震巽下篇之用也頤大過小過中孚二篇之正也故曰至哉文王之作易其得天地之用乎大抵卦變八圖陽在下者以升為變在上者以降為變故升降之對此為升則彼為降此為降則彼為升然康節先天之學不泥書言而猶有卦變之説何耶曰大易之道本之氣數之自然觀先天圖則可見出生之統體矣今六十四卦兩兩相比若近於反對者觀序卦之先後皆有深意要非三陰三陽反對不反對云者近世復有上經三十卦下經二十四卦反對不反對皆本八卦以求合於十有八變者其巧愈甚矣要之卦變一義易之一端耳若以為易道盡於是要非康節所以望後世者姑録之以為外篇之首李氏六十四卦相生圖乾坤者諸卦之祖姤乾一交而為姤復坤一交而為復凡卦五陰一陽者皆自復卦而來復一爻五變而成五卦師謙豫比剝凡卦五陽一陰者皆自姤卦而來姤一爻五變而成五卦同人履小畜大有夬遁乾再交而為遁臨坤再交而為臨凡卦四陰二陽者皆自臨卦而來臨五復五變而成十四卦第一四變明夷震屯頤第二復四變升解坎蒙第三復三變小過萃觀第四復二變蹇晉第五復一變艮凡卦四陽二陰者皆自遁卦而來遁五復五變而成十四卦第一四變訟巽鼎大過第二復四變無妄家人離革第三復三變中孚大畜大壯第四復二變睽需第五復一變兑否乾三交而為否泰坤三交而為泰凡卦三陰三陽者皆自泰卦而來泰三復三變而成九卦第一三變歸妹節損第二復三變豐既濟賁第三復三變恆井蠱凡卦三陽三陰者皆自否卦而來否三復三變而成九卦苐一三變漸旅咸第二復三變渙未濟困第三復三變益噬嗑隨右李挺之六十四卦相生圖其傳授見於反對圖中漢上朱氏曰始虞氏卦變乾坤生坎離乾息而生復臨泰大壯夬坤消而生姤遁否觀剝自復來者一卦豫自明夷來者四卦小過解升震自泰來者九卦蠱賁恆損井歸妹豐節既濟自大壯來者六卦需大畜大過睽鼎兑自夬來者一卦坰人自遁來者五卦訟無妄家人革巽自否來者八卦隨噬嗑咸益用漸渙未濟自觀來者五卦晉蹇頤萃艮自剝來者一卦謙而屯生於坎蒙生於艮比生於師頤小過生於晉睽生於大壯或生於無妄旅生於賁或生於噬嗑中孚生於訟小畜變需上履變訟初姤無生卦師同人大有四卦闕李鼎祚取蜀才盧氏之書補其三卦大有闕而頤卦虞以為生於晉侯果以為生於觀今以此圖考之其合於圖者三十有六卦又時有所疑不合者二十有八卦夫自下而上謂之升自上而下謂之降升者生也息也降者消也陰生陽陽生陰陰復生陽陽復生陰升降消息循環無窮然不離於乾坤一生二二生三至於三極矣故凡卦五陰一陽者皆自復來復一爻五變而成五卦師謙豫比剝凡卦五陽一陰者皆自姤來姤一爻五變而成五卦同人履小畜大有夬凡卦四陰二陽者皆自臨來臨五復五變而成十四卦明夷震屯頤升解坎蒙小過萃觀震晉艮凡卦四陽二陰者皆自遁來遁五復五變而成十四卦訟巽鼎大過無妄家人離革中孚大畜大壯睽需兊凡卦三陰三陽者皆自泰來泰三復三變而成九卦歸妹節損豐既濟賁恆蠱井凡卦三陽三陰者皆自否來否三復三變而成九卦漸旅咸渙未濟困益噬嗑隨乾坤大父母也復姤小父母也嘗考之諸儒之論相生者始於虞翻蜀才近世漢上朱氏用以解易然卦之六十有四由八卦相錯而成也未有先有復姤臨遁泰否而後有諸卦者傳曰八卦成列象在其中矣因而重之爻在其中矣考夫震巽坎離艮兑相合而後成卦今謂震坎艮生於臨巽離兑生於遁毋乃顛倒而不通也邵康節曰無極之前陰含陽也有象之後陽分陰也陰為陽之母陽為陰之父故母孕長男而為復父生長女而為姤是以陽起於復而陰起於姤也又曰易始於乾坤而交於復姤蓋剛交柔而為復柔交剛而為姤自此而變無窮矣由前之説則陽生於子陰生於午之義也由後之説則十二辟卦剛柔相摩之義也今論卦變相生之説曰易於賁曰柔來而文剛剛上而文柔節曰剛柔分而剛得中無妄曰剛自外來而為主於內大傳曰剛柔相推變在其中矣是故有斯義也要之六十四卦之變皆本於八卦而八卦之重又本於乾坤之竒偶今卦之反對則兼上下體六十四卦相生則專用下卦為變是亦一家之學耳謂之易道盡在於是則未矣姑取其大槩著於篇云世應文乾姤遁否觀剝晉大有震豫解恆升井大過隨坎節屯既濟革豐明夷師艮旅大畜損睽履中孚漸坤復臨泰大壯夬需比巽小畜家人益無妄噬嗑頤蠱離旅鼎未濟蒙渙訟同人兑困萃咸蹇謙小過歸妹右先天八卦變其原出於京氏易房受經於梁人焦延夀焦氏之學以一卦變六十四為四千九十六卦京氏八卦用世變而成六十四其法一變初爻為一世再變二爻為二世次變三爻為三世次變四爻為四世次變五爻為五世變皆自下而上至五世而極矣復自上而下變四爻為遊魂次全變下體為歸魂而本體復矣獨上爻不變而八純卦之世居焉其序首乾而震坎艮維之次坤而巽離兊繼之後周衛元嵩著元包皆祖房之世變而異於房者其法首坤次乾次兑艮次離坎次巽震卦各七變而復本卦坤曰太陰乾曰太陽兑曰少陰艮曰少陽離曰仲陰坎曰仲陽巽曰孟陰震曰孟陽其首艮曰歸藏易也然京氏專取世應元包獨論卦體而已至漢上朱氏引康節之説曰有變必有應也變乎內者應乎外變乎外者應乎內變乎上者應乎下變乎下者應乎上本乎天者親上本乎地者親下變之與應常相對也故卦一世者四應二世者五應三世者上應四世者初應五世者二應六世者三應在易言應者十有九卦者之言應者子太叔論迷復凶是也至虞翻始傳其祕竊謂易之論應與者有二一卦之中上下內外互相為應一也以剛對柔以柔遇剛則為相應剛而遇剛柔而遇柔則為不相應二也不専主世爻而言也昔畢中和議貞屯悔豫曰六位盡不遇交故不動既無所之即以世爻為占蓋屯是坎宫二世卦故以二為占則遇八豫是震宫一世卦故以初為占亦遇八皆少陰不變斯非八乎畢中和之言雖不知貞屯悔豫蓋三爻之變而論世爻如此意者八卦之變其占家用之乎葆光張氏曰參而變之遂成八卦伍而變之六十四卦始備矣參而變謂三畫交變小成之卦也伍而變謂自世應之變也漢上朱氏曰三畫之卦三變而反六畫之卦五變而復不知參伍小衍之數也以卦畫反復而言則非矣京氏曰八卦相蕩陽入陰陰入陽陰陽二氣交互不停故曰生生之謂易此京氏即剛柔相推蕩之言以成一家學耳互體乾坤二卦不互大過夬姤互有乾體剝復頤互有坤體屯比觀益下坤上艮中藏剝卦蒙師臨損下震上坤中藏復需小畜巽井下兊上離中藏睽訟履困兊下離上巽中藏家人泰蠱大畜升下兊上震中藏歸妹否隨無妄萃下艮上巽中藏漸大有恆大壯鼎下乾上兑中藏夬同人咸遁革下巽上乾中藏姤謙賁明夷艮下坎上震中藏解豫噬嗑晉震下艮上坎中藏蹇家人蹇歸妹既濟下坎上離中藏未濟睽解漸未濟下離上坎中藏既濟坎渙節中孚下震上艮中藏頤離豐旅小過下巽上兊中藏大過右互體一卦而互一體者五十六一卦而不互者乾坤二卦一卦而互一者復姤夬剝頤大過六卦是以互體參合為乾坤者一為剝復睽家人歸妹漸夬姤蹇解未濟既濟頤大過者四先儒如馬融虞翻崔景多論互體近世張弼専用以解易其説曰大傳二與四同功而異位二多譽四多懼三與五同功而異位三多凶五多功此正論互體也而不知聖人為六位當否言而非為互體設也漢上朱氏雖雜取卦變亦專取互體其説曰一卦含四卦四卦之中復有變上下相揉百物成象其在易則離震合而有頤坤離具而生坎大傳所謂雜物撰德者也至論周太史筮觀之否曰坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光自三至四有艮互體也大抵一卦之中凡具八卦有正有伏有互有參正謂上下二體也伏謂二體從變也互謂一卦有二互體也參謂二互體參合也為易者求之象學往往捨本爻之正義而專求互體之間參錯雜揉以通百物之象其流入於筮占支分蔓衍此王輔嗣之所訶也以其亦一家之學故附於外篇云納甲􅅀壬戌􅅀壬申􅅀壬午􅅀甲辰􅅀甲寅􅅀甲子乾􅄲癸酉􅄲癸亥􅄲癸丑􅄲乙卯􅄲乙巳􅄲乙未坤􅄲庚戌􅄲庚申􅅀庚午􅄲庚辰􅄲庚寅􅅀庚子震􅅀辛卯􅅀辛巳􅄲辛未􅅀辛酉􅅀辛亥􅄲辛丑巽􅄲戊子􅅀戊戌􅄲戊申􅄲戊午􅅀戊辰􅄲戊寅坎􅅀己巳􅄲己未􅅀己酉􅅀己亥􅄲己丑􅅀己卯離􅅀丙寅􅄲丙子􅄲丙戌􅅀丙申􅄲丙午􅄲丙辰艮􅄲丁未􅅀丁酉􅅀丁亥􅄲丁丑􅅀丁卯􅅀丁巳兊右納甲始於京房房易傳曰降五行頒六位陸績注日十二辰分六位升降以持消息吉凶天六地六氣六象六包四象分萬物陰陽無差升降有等陰陽二十四候律吕調矣又曰分天地乾坤之象益之甲壬乙癸乾坤一卦為天地陰陽之本故分甲壬乙癸陰陽之終始震巽之象配庚辛庚陽入震辛陰入巽坎離之象配戊己戊陽入坎己陰入離艮兊之象配丙丁丙陽入艮丁陰入兑八卦分陰陽六位配五行光明四通效易立節於易無所用之往往用之占家耳惟魏伯陽參同契云三日月出庚八日兑象見以為陰陽進退符火之候此道家者流借此以神其説而漢上朱氏始以解易之先後庚甲至於革之已日以為戊己之已其説蓋誕漫不可考故其論先甲後甲也乾納甲壬而乾納甲乾三爻在前先甲三日也五變無妄乾三爻在後後甲三日也求之先儒卦變有三李挺之八卦相生則蠱自泰來三復三變而得之者也京房世應互變則蠱乃巽七變而得之者也蔡墨之論卦變則陸績所謂陽在初稱初九去初之二稱九二則初復七陰在初稱初六去初之二則稱六二則初復八矣皆自以一爻變也今自下遞變為大畜為無妄以求乾體而實先後甲之説以為本之八卦相生也彼以三陰三陽而此非也以為本之世應也彼以八純卦為主而此非也以為本之史墨卦變也彼一爻變則一爻復此又非也其論已日也始取李氏六十四卦相生矣曰革自遁來無妄變也二變家人三變離四變革無妄之震納庚辛之離納已十日至庚而更更革也自庚至已十日浹也已日者浹日也其説又支蔓而無紀矣大抵用納甲以解剝卦爻其弊必至於此此不免王弼之議也卦變􅅀夬􅅀大有􅅀小畜􅅀履􅅀同人􅅀姤乾􅄲剝􅄲比􅄲豫􅄲謙􅄲師􅄲復坤􅄲益􅅀復􅄲隨􅄲既濟􅄲節􅅀比屯􅅀師􅄲渙􅄲未濟􅄲蠱􅅀剝􅄲損蒙􅄲小畜􅅀泰􅄲夬􅅀節􅅀既濟􅅀井需􅅀困􅅀未濟􅅀渙􅄲姤􅅀否􅄲履訟􅄲蒙􅄲坎􅄲解􅄲升􅅀坤􅄲臨師􅅀觀􅅀坤􅄲萃􅄲蹇􅄲坎􅄲屯比􅅀需􅅀大畜􅄲乾􅅀中孚􅅀家人􅅀巽小畜􅅀兑􅅀睽􅅀中孚􅄲乾􅅀無妄􅅀訟履􅄲大畜􅄲需􅄲大壯􅅀臨􅅀明夷􅅀升泰􅅀萃􅅀晉􅅀觀􅄲遁􅄲訟􅄲無妄否􅅀革􅅀離􅅀家人􅅀無妄􅄲乾􅅀遁同人􅅀大壯􅄲乾􅅀大畜􅅀睽􅅀離􅅀鼎大有􅄲艮􅄲蹇􅄲小過􅅀坤􅄲升􅄲明夷謙􅄲晉􅄲萃􅅀坤􅄲解􅄲震豫􅄲無妄􅅀震􅅀屯􅄲革􅄲兑􅅀萃隨􅅀井􅄲巽􅄲鼎􅄲蒙􅅀艮􅄲大畜蠱􅄲損􅄲節􅄲歸妹􅄲泰􅅀復􅅀師臨􅅀比􅅀剝􅄲否􅄲漸􅄲渙􅄲益觀􅅀震􅄲無妄􅅀頤􅄲離􅄲睽􅅀晉噬嗑􅅀明夷􅄲家人􅄲離􅅀頤􅄲大畜􅅀艮賁􅅀坤􅄲觀􅄲晉􅄲艮􅄲蒙􅄲頤剝􅄲頤􅄲屯􅄲震􅄲明夷􅄲臨􅅀坤復􅅀隨􅅀噬嗑􅅀益􅄲同人􅄲履􅅀否無妄􅅀泰􅄲小畜􅄲大有􅅀損􅅀賁􅅀蠱大畜􅅀復􅄲益􅄲噬嗑􅄲賁􅄲損􅅀剝頤􅄲姤􅅀恆􅅀井􅅀困􅅀咸􅄲夬大過􅄲渙􅅀師􅄲困􅄲井􅅀比􅄲節坎􅅀豐􅄲同人􅅀賁􅅀噬嗑􅄲大有􅅀旅離􅄲遁􅅀小過􅅀蹇􅅀萃􅄲大過􅄲革咸􅄲鼎􅄲大過􅅀井􅅀解􅅀小過􅄲大壯恆􅅀咸􅅀旅􅅀漸􅅀否􅄲姤􅄲同人遁􅄲大有􅄲夬􅅀泰􅅀歸妹􅅀豐􅅀恆大壯􅅀豫􅄲否􅅀剝􅄲旅􅄲未濟􅄲噬嗑晉􅄲賁􅄲既濟􅄲豐􅅀履􅄲泰􅅀謙明夷􅄲既濟􅅀賁􅄲同人􅅀益􅄲小畜􅅀漸家人􅅀歸妹􅄲履􅅀損􅄲大有􅅀噬嗑􅄲未濟睽􅄲漸􅅀謙􅄲咸􅅀比􅅀井􅄲既濟蹇􅄲未濟􅄲困􅅀師􅄲恆􅅀豫􅄲歸妹解􅅀臨􅄲中孚􅄲睽􅄲大畜􅅀頤􅅀蒙損􅅀屯􅅀頤􅄲無妄􅄲家人􅄲中孚􅅀觀益􅄲乾􅅀大壯􅅀需􅅀兊􅅀革􅅀大過夬􅅀大過􅅀鼎􅅀巽􅅀訟􅅀遁􅅀乾姤􅄲否􅅀豫􅅀比􅄲咸􅄲困􅄲隨萃􅄲蠱􅄲井􅄲恆􅅀師􅅀謙􅄲泰升􅄲訟􅅀解􅅀坎􅄲大過􅅀萃􅄲兑困􅄲巽􅅀升􅄲大過􅅀坎􅅀蹇􅄲需井􅄲同人􅅀豐􅅀既濟􅅀隨􅄲夬􅅀咸革􅅀恆􅄲姤􅅀蠱􅅀未濟􅅀旅􅄲大有鼎􅄲噬嗑􅄲隨􅅀復􅄲豐􅄲歸妹􅅀豫震􅅀謙􅄲漸􅄲旅􅅀剝􅄲蠱􅄲賁艮􅅀蹇􅅀艮􅄲遁􅅀觀􅄲巽􅄲家人漸􅄲睽􅄲兊􅅀臨􅄲大壯􅅀震􅅀解歸妹􅄲離􅄲革􅅀明夷􅅀震􅄲大壯􅅀小過豐􅅀小過􅄲遁􅅀艮􅅀晉􅄲鼎􅄲離旅􅅀井􅅀蠱􅄲姤􅅀渙􅅀漸􅄲小畜巽􅄲履􅅀歸妹􅅀節􅄲夬􅅀隨􅅀困兑􅅀坎􅅀蒙􅄲訟􅄲巽􅅀觀􅄲中孚渙􅄲中孚􅅀臨􅄲兑􅄲需􅅀屯􅅀坎節􅅀節􅅀損􅄲履􅄲小畜􅅀益􅅀渙中孚􅄲旅􅄲咸􅅀謙􅅀豫􅄲恆􅄲豐小過􅄲家人􅅀明夷􅄲革􅅀屯􅄲需􅅀蹇既濟􅅀解􅄲訟􅅀蒙􅄲鼎􅅀晉􅄲睽未濟昔史墨以變卦論乾之初九曰在乾之姤九二曰其同人九五曰其大有上九曰其夬坤之上六曰其剝王子伯廖曰在豐之離子太叔曰在復之頤大抵占筮以動爻為主往往論變而古人言易亦有不筮而以變言其義者是以陸績曰陽在初稱初九去初之二稱九二則初復七陰在初稱初六去初之二稱六二則初復八矣卦畫七八經書九六七八為彖九六為爻四者互明聖人之妙意也近世沈丞相易小傳既以正體發明爻象之指又以變體擬議變動之意以求合乎動則觀其變而玩其占之意云而亦未免拘攣也動爻陸績虞翻又論動爻曰陰陽失位則變得位則否故以陽居陰位陰居陽位則動其説以為既濟六爻陰陽得位故説卦曰既濟定也而漢上解易往往多用其説以其隨卦消息故不係之圖云卦氣常氣月中節四正卦初候次候末候初卦中卦終卦冬至十一月中坎初六蚯蚓結麋角解水泉動公中孚辟復侯屯內小寒十二月節坎九二鴈北鄉鵲始巢野雞始鴝侯屯外大夫謙卿睽大寒十二月中坎六三雞始乳鷙鳥厲疾水澤腹堅公升辟臨侯小過內立春正月節坎六四東風解凍勢蟲始振魚上冰侯小過外大夫蒙卿益雨水正月中坎九五獺祭魚鴻鴈來草木萌動公漸辟泰侯需內驚蟄二月節坎上六桃始華倉庚鳴鷹化為鳩侯需大夫隨卿晉春分二月中震初九玄鳥至雷乃發聲始電公解辟大壯侯豫清明三月節震六二桐始華田鼠化為鴽虹始見侯豫外大夫訟卿蠱榖雨三月中震六三萍始生鳴鳩拂其羽戴勝降于桑公革辟夬侯旅內立夏四月節震九四螻蟈鳴蚯蚓出王瓜生侯旅大夫師卿比小滿四月中震六五苦菜生靡草死小暑至公小畜辟乾侯大有內芒種五月節震上六螳螂生鵙始鳴反舌無聲侯大有外大夫家人卿井夏至五月中離初九鹿角解蜩始鳴半夏生公咸辟姤侯鼎內小暑六月節離六二溫風至蟋蟀居壁鷹乃學習侯鼎外大夫豐卿渙大暑六月中離九三腐草為螢土潤溽暑大雨時行公履辟遁侯恆內立秋七月節離九四涼風至白露降寒蟬鳴侯恆外大夫節卿同人處暑七月中離六五鷹祭鳥天地始肅禾乃登公損辟否侯巽內白露八月節離上九鴻鴈來玄鳥歸羣鳥養羞侯巽大夫萃卿大畜秋分八月中兑初九雷乃收聲蟄蟲壞户水始涸公賁辟觀侯歸妹內寒露九月節兑九二鴻鴈來賓雀入大水為蛤菊有黃華侯歸妹外大夫無妄卿明夷霜降九月中兑六二豺乃祭獸草木黃落蟄蟲咸俯公困辟剝侯艮內立冬十月節兑九四水始冰地始凍野雞入水為蜃侯艮大夫既濟卿噬嗑小雪十月中兑九五虹藏不見天氣上騰地氣下降閉塞而成冬公大過辟坤侯未濟大雪十一月節兑上六鶡鳥不鳴虎始交荔挺生侯未濟大夫蹇卿頤孔頴達疏七日來復之義案易稽覽圖卦氣起中孚坎離震兊各主一方餘六十卦卦有六爻爻主六日凡三百六十日餘五日四分日之一每日分為八十分凡四百二十分卦各得七分故六日七分也其源出於易緯之言曰月有五卦卦有大小有諸侯有大夫有卿有公有辟五卦分爻迭主一日周而復始終月而既大抵求合乎七日來復之義而已不知復之所謂七日者蓋自一陰剝陽至復而一陽生適七日爾觀先天圖自乾而始則一陰生自坤而復則一陽生非有他説也今所謂起中孚者不知何本始或謂太玄起於中次周中即中孚周即復也其義或本於此然考之郎覬傳曰焦延夀京房已傳六日七分之學則又不自雄始矣今太玄八十一首之序與卦氣圖無一毫之差則所以論陰陽升降又自一家學也昔者聖人曰乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日則所謂當期之日者乾坤之䇿耳卦氣以爻主一日則又異乎聖人之言也大抵論象數者當以大傳為正有如大傳未嘗言自成一家以求陰陽災異之變是蓋巫史之學耳非大易之旨也易裨傳外篇
